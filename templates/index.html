<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SimSit AI | Modern Chat</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="dark-theme">
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <button class="new-chat-btn" id="new-chat-btn">
                    <i data-lucide="plus"></i>
                    <span>New Chat</span>
                </button>
            </div>
            <div class="sessions-list" id="sessions-list">
                <!-- Sessions will be injected here -->
            </div>
            <div class="sidebar-footer">
                <div class="user-profile">
                    <div class="avatar">U</div>
                    <span class="username">User Settings</span>
                </div>
            </div>
        </aside>

        <!-- Main Chat Area -->
        <main class="chat-main">
            <header class="chat-header">
                <button class="menu-toggle" id="menu-toggle">
                    <i data-lucide="menu"></i>
                </button>
                <h1 id="current-session-title">SimSit AI</h1>
                <div class="header-actions">
                    <button id="clear-chat-btn" title="Clear Chat">
                        <i data-lucide="trash-2"></i>
                    </button>
                </div>
            </header>

            <div class="messages-container" id="messages-container">
                <!-- Welcome Message -->
                <div class="welcome-screen" id="welcome-screen">
                    <div class="logo-large">S</div>
                    <h2>How can I help you today?</h2>
                    <div class="suggestions">
                        <div class="suggestion-card" onclick="setInput('Explain quantum computing')">
                            <p>Explain quantum computing in simple terms</p>
                        </div>
                        <div class="suggestion-card" onclick="setInput('Write a Python script')">
                            <p>Write a Python script to scrape a website</p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="input-area">
                <div class="input-wrapper">
                    <div class="input-actions-left">
                        <label for="file-upload" class="action-btn" title="Upload File">
                            <i data-lucide="paperclip"></i>
                            <input type="file" id="file-upload" hidden>
                        </label>
                    </div>
                    <textarea id="chat-input" placeholder="Message SimSit AI..." rows="1"></textarea>
                    <div class="input-actions-right">
                        <button id="voice-btn" class="action-btn" title="Voice Input">
                            <i data-lucide="mic"></i>
                        </button>
                        <button id="send-btn" class="send-btn" disabled>
                            <i data-lucide="arrow-up"></i>
                        </button>
                    </div>
                </div>
                <p class="input-footer">SimSit AI can make mistakes. Check important info.</p>
            </div>
        </main>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
    <script>
        // Initialize Lucide icons
        lucide.createIcons();
        
        function setInput(text) {
            const input = document.getElementById('chat-input');
            input.value = text;
            input.dispatchEvent(new Event('input'));
            input.focus();
        }
    </script>
</body>
</html>
